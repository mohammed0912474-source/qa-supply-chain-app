<style>
:root{
  --navy:#0B2A4A; --navy2:#123A5E; --navy3:#0E355C;
  --accent:#2E7BD6; --accent-dark:#1E5FA8;
  --bg:#EEF2F7; --card:#FFFFFF; --text:#152232; --muted:#66768C;
  --danger:#D64545; --danger-dark:#B93636; --success:#1E8E5A; --warn:#C9891E;
  --border:#DCE3EC; --radius:12px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:"Segoe UI", Tahoma, Geneva, Arial, sans-serif;
  padding-bottom:76px; -webkit-tap-highlight-color:transparent;
}
[dir="rtl"] body{font-family:"Segoe UI", Tahoma, Arial, sans-serif;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit; font-size:15px;}

/* Header */
.app-header{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy3) 100%);
  color:#fff; padding:14px 16px 0; position:sticky; top:0; z-index:40;
  box-shadow:0 2px 10px rgba(0,0,0,.15);
}
.header-top{display:flex; align-items:center; justify-content:space-between; gap:8px; padding-bottom:12px;}
.tagline-strip{
  border-top:1px solid rgba(255,255,255,.16);
  padding:7px 4px 9px; text-align:center; font-size:12px; font-weight:700;
  color:#EAF2FC; letter-spacing:.2px; display:flex; align-items:center; justify-content:center; gap:6px;
}
.tagline-strip .dot{color:#F0B429; font-size:10px;}
.app-header .brand{display:flex; align-items:center; gap:10px; min-width:0;}
.app-header .brand .logo{
  width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;font-size:20px; flex-shrink:0;
}
.app-header .brand .titles{min-width:0;}
.app-header .brand h1{font-size:15px; margin:0; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.app-header .brand .sub{font-size:11px; opacity:.75; margin-top:1px;}
.header-actions{display:flex; align-items:center; gap:6px; flex-shrink:0;}
.icon-btn{
  background:rgba(255,255,255,.12); border:none; color:#fff; border-radius:9px;
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
  font-size:16px; position:relative;
}
.status-pill{
  font-size:10px; padding:3px 8px; border-radius:20px; display:flex; align-items:center; gap:4px;
  background:rgba(255,255,255,.1);
}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--success);}
.status-pill.offline .status-dot{background:var(--danger);}

/* Nav */
.tabbar{
  position:fixed; bottom:0; inset-inline-start:0; inset-inline-end:0; z-index:40;
  background:#fff; border-top:1px solid var(--border);
  display:flex; overflow-x:auto; padding:6px 4px; gap:2px;
  box-shadow:0 -2px 10px rgba(0,0,0,.06);
}
.tab-btn{
  flex:1 0 auto; min-width:64px; background:none; border:none; display:flex; flex-direction:column;
  align-items:center; gap:2px; padding:6px 8px; border-radius:10px; color:var(--muted); font-size:10.5px;
}
.tab-btn .ico{font-size:19px;}
.tab-btn.active{color:var(--accent-dark); background:#EAF2FC; font-weight:700;}

/* Layout */
.container{max-width:820px; margin:0 auto; padding:14px;}
.card{background:var(--card); border-radius:var(--radius); padding:16px; margin-bottom:14px; box-shadow:0 1px 3px rgba(20,40,70,.06); border:1px solid var(--border);}
.card h2{margin:0 0 4px; font-size:17px; color:var(--navy);}
.card .desc{font-size:12.5px; color:var(--muted); margin-bottom:10px;}
.section-title{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; flex-wrap:wrap; gap:8px;}
.section-title h2{margin:0;}

/* dashboard */
.stats-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px;}
.stat-card{background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:14px; text-align:center;}
.stat-card .num{font-size:24px; font-weight:800; color:var(--navy);}
.stat-card .lbl{font-size:12px; color:var(--muted); margin-top:2px;}
.stat-card .ico{font-size:22px; margin-bottom:4px;}

.kpi-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px;}
.kpi-card{background:#fff; border:1px solid var(--border); border-inline-start:5px solid var(--navy); border-radius:var(--radius); padding:12px 14px;}
.kpi-card.good{border-inline-start-color:var(--success);}
.kpi-card.warn{border-inline-start-color:var(--warn);}
.kpi-card.bad{border-inline-start-color:var(--danger);}
.kpi-card .kpi-val{font-size:21px; font-weight:800; color:var(--navy);}
.kpi-card .kpi-lbl{font-size:11.5px; color:var(--muted); margin-top:3px; line-height:1.4;}
.period-toggle{display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; align-items:center;}
.period-toggle button.active{background:var(--accent); color:#fff;}
.chart-card{margin-top:6px;}
.chart-card h3{font-size:13.5px; color:var(--navy2); margin:0 0 10px;}

/* Buttons */
.btn{border:none; border-radius:9px; padding:10px 16px; font-size:14px; font-weight:700; display:inline-flex; align-items:center; gap:6px;}
.btn-primary{background:var(--accent); color:#fff;}
.btn-primary:active{background:var(--accent-dark);}
.btn-outline{background:#fff; color:var(--accent-dark); border:1.5px solid var(--accent);}
.btn-danger{background:#FCEAEA; color:var(--danger-dark); border:1.5px solid #F3C6C6;}
.btn-success{background:#E7F5EE; color:var(--success); border:1.5px solid #BEE3D0;}
.btn-sm{padding:6px 10px; font-size:12.5px; border-radius:7px;}
.btn-block{width:100%; justify-content:center;}
.btn:disabled{opacity:.5;}

/* Forms */
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
@media (max-width:560px){.form-grid{grid-template-columns:1fr;}}
.field{margin-bottom:2px;}
.field label{display:block; font-size:12.5px; font-weight:700; color:var(--navy2); margin-bottom:4px;}
.field .req{color:var(--danger);}
.field input[type=text], .field input[type=number], .field input[type=date], .field input[type=tel], .field input[type=password],
.field select, .field textarea{
  width:100%; padding:9px 10px; border:1.5px solid var(--border); border-radius:8px; background:#FBFCFE; color:var(--text);
}
.field textarea{min-height:60px; resize:vertical;}
.field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--accent);}
.field-full{grid-column:1 / -1;}
.hint{font-size:11px; color:var(--muted); margin-top:3px;}

/* Groups (repeatable) */
.group-block{grid-column:1/-1; border:1.5px dashed var(--border); border-radius:10px; padding:10px; margin:6px 0; background:#FAFBFD;}
.group-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
.group-header b{font-size:13px; color:var(--navy);}
.group-item{background:#fff; border:1px solid var(--border); border-radius:9px; padding:10px; margin-bottom:8px; position:relative;}
.group-item .grid-mini{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
@media (max-width:480px){.group-item .grid-mini{grid-template-columns:1fr;}}
.group-item .rm-row{display:flex; justify-content:flex-end; margin-top:6px;}
.chip{display:inline-block; background:#EAF2FC; color:var(--accent-dark); font-size:11px; font-weight:700; border-radius:6px; padding:2px 7px; margin-inline-end:6px;}

/* multiDate rows */
.md-row{display:flex; gap:8px; align-items:center; margin-bottom:6px; flex-wrap:wrap;}
.md-row input{flex:1; min-width:120px;}

/* images */
.img-grid{display:flex; flex-wrap:wrap; gap:8px; margin-top:6px;}
.img-thumb{position:relative; width:74px; height:74px; border-radius:8px; overflow:hidden; border:1px solid var(--border); background:#f2f2f2;}
.img-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
.img-thumb .rm{position:absolute; top:2px; inset-inline-end:2px; background:rgba(214,69,69,.9); color:#fff; border:none; border-radius:50%; width:18px; height:18px; font-size:11px; line-height:1;}
.file-btn{display:inline-flex; align-items:center; gap:6px; background:#EAF2FC; color:var(--accent-dark); border:1.5px dashed var(--accent); border-radius:9px; padding:9px 12px; font-size:13px; font-weight:700; cursor:pointer;}
.file-btn input{display:none;}

/* computed display */
.computed-box{background:#EAF2FC; border:1.5px solid var(--accent); border-radius:8px; padding:10px 12px; font-weight:800; color:var(--navy); font-size:16px;}

/* List / table */
.toolbar{display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; align-items:center;}
.toolbar input[type=text],.toolbar input[type=date]{padding:8px 10px; border:1.5px solid var(--border); border-radius:8px; font-size:13px;}
.record-card{background:#fff; border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:9px;}
.record-card .top{display:flex; justify-content:space-between; gap:8px; align-items:flex-start;}
.record-card .main{font-size:13.5px; font-weight:700; color:var(--navy);}
.record-card .meta{font-size:12px; color:var(--muted); margin-top:2px; line-height:1.5;}
.record-card .actions{display:flex; gap:6px; flex-shrink:0;}
.empty-state{text-align:center; padding:36px 16px; color:var(--muted);}
.empty-state .ico{font-size:36px; margin-bottom:8px;}

/* Modal */
.modal-overlay{position:fixed; inset:0; background:rgba(10,20,35,.55); z-index:100; display:flex; align-items:flex-end; justify-content:center;}
.modal-box{background:#fff; width:100%; max-width:480px; border-radius:16px 16px 0 0; padding:18px; max-height:88vh; overflow:auto;}
@media (min-width:600px){.modal-overlay{align-items:center;} .modal-box{border-radius:16px;}}
.modal-box h3{margin:0 0 12px; color:var(--navy);}

/* toast */
.toast{position:fixed; bottom:86px; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff; padding:10px 18px; border-radius:24px; font-size:13px; z-index:200; box-shadow:0 4px 14px rgba(0,0,0,.25); max-width:90vw; text-align:center;}

/* summary table */
.summary-table{width:100%; border-collapse:collapse; font-size:13px;}
.summary-table th,.summary-table td{padding:8px; border-bottom:1px solid var(--border); text-align:start;}
.summary-table th{color:var(--muted); font-weight:700; font-size:11.5px;}

.field-row-builder{display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:6px; align-items:center; margin-bottom:8px;}
@media (max-width:600px){.field-row-builder{grid-template-columns:1fr 1fr;}}
.field-row-builder select,.field-row-builder input{padding:7px 8px; border:1.5px solid var(--border); border-radius:7px; font-size:12.5px;}

/* auth screens */
.auth-screen{min-height:70vh; display:flex; align-items:center; justify-content:center; padding:20px 14px;}
.auth-box{width:100%; max-width:420px;}
.auth-logo{width:64px; height:64px; border-radius:16px; background:linear-gradient(135deg,var(--navy),var(--navy3)); color:#fff; display:flex; align-items:center; justify-content:center; font-size:32px; margin:0 auto 14px;}
.auth-title{text-align:center; font-size:19px; font-weight:800; color:var(--navy); margin-bottom:4px;}
.auth-sub{text-align:center; font-size:13px; color:var(--muted); margin-bottom:18px;}
.user-chip{display:flex; align-items:center; justify-content:space-between; width:100%; background:#fff; border:1.5px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; text-align:start;}
.user-chip:active{background:#EAF2FC;}
.user-chip .nm{font-weight:700; color:var(--navy); font-size:14px;}
.user-chip .rl{font-size:11.5px; color:var(--muted);}
.auth-divider{display:flex; align-items:center; gap:10px; margin:14px 0; color:var(--muted); font-size:11.5px;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.link-btn{background:none; border:none; color:var(--accent-dark); font-size:13px; font-weight:700; text-decoration:underline;}

.lang-en [data-ar-only]{display:none;}
.lang-ar [data-en-only]{display:none;}
::-webkit-scrollbar{height:6px;width:6px;}
::-webkit-scrollbar-thumb{background:#c7d1de;border-radius:4px;}

/* PWA update banner */
.update-banner{position:fixed; top:0; inset-inline:0; z-index:500; background:var(--warn); color:#fff; padding:10px 14px; font-size:13px; display:flex; align-items:center; justify-content:space-between; gap:10px; box-shadow:0 2px 8px rgba(0,0,0,.25);}
.update-banner button{background:#fff; color:var(--navy); border:none; border-radius:8px; padding:6px 12px; font-weight:800; font-size:12.5px;}
</style>

<script>
/* ===================== State & Storage ===================== */
let LANG = localStorage.getItem('qa_lang') || 'ar';
const DEFAULT_MASTER_CODE = 'DAL-QA-2026'; // <-- الكود الافتراضي لأول دخول لأفراد الفريق. يمكن للمسؤول تغييره من "إدارة الأقسام > لوحة التحكم الإدارية"، لكن لازم يبلّغ الفريق بالكود الجديد ويُعاد توزيع نفس الملف عليهم لأن التطبيق يعمل بدون سيرفر مركزي.

/* عبارات ترحيبية احترافية تخص الجودة وسلسلة الإمداد - تظهر أعلى التطبيق، وتُختار واحدة عشوائيًا مع كل جلسة استخدام جديدة */
const WELCOME_TAGLINES = [
  {ar:'الجودة تصنع الفرق', en:'Quality Makes the Difference'},
  {ar:'التميز في كل تفصيلة', en:'Excellence in Every Detail'},
  {ar:'جودة تستحق الثقة', en:'Quality You Can Trust'},
  {ar:'سلسلة إمداد بلا توقف', en:'A Supply Chain That Never Stops'},
  {ar:'دقة اليوم أساس نجاح الغد', en:"Today's Precision, Tomorrow's Success"},
  {ar:'معايير عالية، نتائج أعلى', en:'High Standards, Higher Results'},
  {ar:'كل شحنة تستحق الفحص', en:'Every Shipment Deserves Inspection'},
  {ar:'نحو سلسلة إمداد أكثر أمانًا', en:'Towards a Safer Supply Chain'},
  {ar:'الالتزام بالجودة مسؤولية الجميع', en:'Quality Commitment is Everyone\'s Responsibility'},
  {ar:'من الفحص الدقيق تبدأ الثقة', en:'Trust Begins with Careful Inspection'}
];
const SESSION_TAGLINE = WELCOME_TAGLINES[Math.floor(Math.random()*WELCOME_TAGLINES.length)];

/* رفع الصور لخدمة ImgBB المجانية عشان تتزامن الصور بين كل الأفراد من غير أي تكلفة على Firebase */
const IMGBB_API_KEY = '2e40bd26cdd16811e0091eb15993b992';
async function uploadToImgBB(dataUrl){
  try{
    const base64 = dataUrl.split(',')[1];
    const formData = new FormData();
    formData.append('key', IMGBB_API_KEY);
    formData.append('image', base64);
    const res = await fetch('https://api.imgbb.com/1/upload', { method:'POST', body: formData });
    const json = await res.json();
    if(json && json.success && json.data && json.data.url) return json.data.url;
    return null;
  }catch(e){ console.warn('ImgBB upload failed', e); return null; }
}
const state = { view:'home', auth:null, editingSectionId:null, editingRecordId:null, currentRecord:null, search:'', dateFrom:'', dateTo:'', builderFields:[], monthly:{month:new Date().getMonth()+1, year:new Date().getFullYear()}, dashboardPeriod:'all', regTempBiometric:null, formTemp:{}, builtinFieldTarget:null };

const Store = {
  get(key, def){ try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; }catch(e){ return def; } },
  set(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); return true; }catch(e){ console.error('storage error',e); return false; } }
};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function t(o){ if(o==null) return ''; if(typeof o==='string') return o; return o[LANG] || o.ar || o.en || ''; }
function todayISO(){ const d = new Date(); const y=d.getFullYear(); const m=String(d.getMonth()+1).padStart(2,'0'); const day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function pct(part,total){ const p=parseFloat(part)||0; const tt=parseFloat(total)||0; if(tt<=0) return null; return p/tt*100; }

/* ===================== IndexedDB (images + exported files) ===================== */
let _dbPromise=null;
function openDB(){
  if(_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve,reject)=>{
    const req = indexedDB.open('qaSystemDB', 2);
    let settled = false;
    req.onupgradeneeded = e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('images')) db.createObjectStore('images',{keyPath:'id'});
      if(!db.objectStoreNames.contains('files')) db.createObjectStore('files',{keyPath:'id'});
    };
    req.onsuccess = e=>{ settled = true; resolve(e.target.result); };
    req.onerror = e=>{ settled = true; _dbPromise = null; reject(e); };
    req.onblocked = ()=>{ console.warn('IndexedDB upgrade blocked — another tab of this app may be open'); };
    setTimeout(()=>{ if(!settled){ settled = true; _dbPromise = null; reject(new Error('IndexedDB open timed out')); } }, 5000);
  });
  return _dbPromise;
}
async function saveImage(id, dataUrl){ const db = await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction('images','readwrite'); tx.objectStore('images').put({id,dataUrl}); tx.oncomplete=()=>res(true); tx.onerror=e=>rej(e); }); }
async function getImage(id){ try{ const db = await openDB(); return new Promise((res)=>{ const tx=db.transaction('images','readonly'); const r=tx.objectStore('images').get(id); r.onsuccess=()=>res(r.result?r.result.dataUrl:null); r.onerror=()=>res(null); }); }catch(e){ return null; } }
async function deleteImageFromDB(id){ try{ const db = await openDB(); const tx=db.transaction('images','readwrite'); tx.objectStore('images').delete(id); }catch(e){} }

function textToDataUrl(text, mime){
  const bytes = new TextEncoder().encode(text);
  let binary = ''; bytes.forEach(b=> binary += String.fromCharCode(b));
  return `data:${mime};base64,${btoa(binary)}`;
}
async function storeExportedFile(filename, kind, dataUrl){
  try{
    const db = await openDB();
    const meta = { id: uid(), filename, kind, dataUrl, createdAt: new Date().toISOString() };
    await new Promise((res,rej)=>{ const tx=db.transaction('files','readwrite'); tx.objectStore('files').put(meta); tx.oncomplete=()=>res(true); tx.onerror=e=>rej(e); });
  }catch(e){ console.warn('storeExportedFile failed', e); }
}
async function getExportedFiles(){
  try{
    const db = await openDB();
    return new Promise((res)=>{ const tx=db.transaction('files','readonly'); const req=tx.objectStore('files').getAll(); req.onsuccess=()=>res(req.result||[]); req.onerror=()=>res([]); });
  }catch(e){ return []; }
}
async function deleteExportedFile(id){
  try{ const db = await openDB(); const tx=db.transaction('files','readwrite'); tx.objectStore('files').delete(id); }catch(e){}
}
function downloadDataUrlFile(filename, dataUrl){
  const a = document.createElement('a'); a.href = dataUrl; a.download = filename; document.body.appendChild(a); a.click(); a.remove();
}
async function viewDataUrlFile(dataUrl){
  try{
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);
    const w = window.open(blobUrl, '_blank');
    if(!w) downloadDataUrlFile('file.pdf', dataUrl);
    setTimeout(()=> URL.revokeObjectURL(blobUrl), 120000);
  }catch(e){
    console.warn('view failed', e);
    downloadDataUrlFile('file.pdf', dataUrl);
  }
}
async function dataUrlToFile(dataUrl, filename, mime){
  const res = await fetch(dataUrl);
  const blob = await res.blob();
  return new File([blob], filename, {type: mime || blob.type});
}
async function shareStoredFileMeta(f){
  const mimeMap = { pdf:'application/pdf', xlsx:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', csv:'text/csv' };
  try{
    const file = await dataUrlToFile(f.dataUrl, f.filename, mimeMap[f.kind]);
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title: f.filename});
    } else {
      showToast(t(STR.shareNotSupported));
    }
  }catch(err){
    if(err && err.name === 'AbortError') return; // user cancelled the share sheet
    console.warn('share failed', err);
    showToast(t(STR.shareNotSupported));
  }
}

/* ===================== Security helpers (password hashing + biometric) ===================== */
async function sha256Hex(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function biometricAvailable(){
  try{
    if(!window.PublicKeyCredential || !PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable) return false;
    return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
  }catch(e){ return false; }
}
async function registerBiometric(userLabel){
  try{
    const available = await biometricAvailable();
    if(!available) return null;
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const userIdBytes = crypto.getRandomValues(new Uint8Array(16));
    const cred = await navigator.credentials.create({
      publicKey:{
        challenge, rp:{name:'QA Supply Chain'},
        user:{ id:userIdBytes, name:userLabel||'user', displayName:userLabel||'user' },
        pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
        authenticatorSelection:{authenticatorAttachment:'platform', userVerification:'required'},
        timeout:60000
      }
    });
    if(!cred) return null;
    return btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
  }catch(e){ console.warn('biometric register failed', e); return null; }
}
async function verifyBiometric(credIdB64){
  try{
    const rawId = Uint8Array.from(atob(credIdB64), c=>c.charCodeAt(0));
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const assertion = await navigator.credentials.get({
      publicKey:{ challenge, allowCredentials:[{id:rawId, type:'public-key', transports:['internal']}], userVerification:'required', timeout:60000 }
    });
    return !!assertion;
  }catch(e){ console.warn('biometric verify failed', e); return false; }
}

const _subscribedSections = new Set();

function qaCol(path){ return db.collection('qa_app').doc(path.split('/')[0]).collection(path.split('/')[1] || 'items'); }

let _appBooted = false;
let _metaReady = false;
let _usersReady = false;
let _renderScheduled = false;
function scheduleRender(){
  if(!_appBooted) return;
  if(_renderScheduled) return;
  _renderScheduled = true;
  requestAnimationFrame(()=>{ _renderScheduled = false; render(); });
}
function tryBootApp(){
  if(_appBooted) return;
  if(!_metaReady || !_usersReady) return;
  _appBooted = true;
  initAuthState();
  render();
  setTimeout(()=> retryPendingImageUploads(), 1500);
}
function renderLoadingScreen(){
  return `<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg);">
    <div style="text-align:center;">
      <div style="width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--navy),var(--navy3));color:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 14px;">🛡️</div>
      <div style="color:var(--muted);font-size:13px;">${LANG==='ar'?'جاري التحميل...':'Loading...'}</div>
    </div>
  </div>`;
}

function subscribeMeta(){
  db.collection('qa_app').doc('meta').onSnapshot(snap=>{
    const d = snap.data() || {};
    META_CACHE.masterCode = d.masterCode || null;
    META_CACHE.adminPasswordHash = d.adminPasswordHash || null;
    META_CACHE.adminBiometricCredId = d.adminBiometricCredId || null;
    if(!_metaReady){ _metaReady = true; tryBootApp(); }
    if(_appBooted){ if(state.auth) scheduleRender(); else if(state.view==='builder') scheduleRender(); }
  }, err=> console.warn('meta sync error', err));
}
function subscribeUsers(){
  qaCol('users/items').onSnapshot(snap=>{
    const arr = []; snap.forEach(doc=> arr.push({id:doc.id, ...doc.data()}));
    USERS_CACHE.list = arr;
    if(!_usersReady){ _usersReady = true; tryBootApp(); }
    scheduleRender();
  }, err=> console.warn('users sync error', err));
}
function subscribeAccessLog(){
  qaCol('accessLog/items').orderBy('time','desc').limit(500).onSnapshot(snap=>{
    const arr = []; snap.forEach(doc=> arr.push({id:doc.id, ...doc.data()}));
    ACCESS_LOG_CACHE.list = arr;
    if(_appBooted && state.view==='builder') scheduleRender();
  }, err=> console.warn('accessLog sync error', err));
}
function subscribeResetRequests(){
  qaCol('passwordResetRequests/items').onSnapshot(snap=>{
    const arr = []; snap.forEach(doc=> arr.push({id:doc.id, ...doc.data()}));
    RESET_REQUESTS_CACHE.list = arr;
    if(_appBooted && state.view==='builder') scheduleRender();
  }, err=> console.warn('resetRequests sync error', err));
}
function subscribeCustomSections(){
  qaCol('customSections/items').onSnapshot(snap=>{
    const arr = []; snap.forEach(doc=> arr.push(doc.data()));
    CUSTOM_SECTIONS_CACHE.list = arr;
    arr.forEach(s=> subscribeSection(s.id));
    scheduleRender();
  }, err=> console.warn('customSections sync error', err));
}
function subscribeSection(sectionId){
  if(_subscribedSections.has(sectionId)) return;
  _subscribedSections.add(sectionId);
  RECORDS_CACHE[sectionId] = RECORDS_CACHE[sectionId] || [];
  qaCol('records_'+sectionId+'/items').onSnapshot(snap=>{
    const arr = []; snap.forEach(doc=> arr.push(doc.data()));
    RECORDS_CACHE[sectionId] = arr;
    if(_appBooted && !state.auth && state.view!=='form') scheduleRender();
  }, err=> console.warn('records sync error', sectionId, err));
}
function subscribeBuiltinExtensions(){
  db.collection('qa_app').doc('builtinExtensions').onSnapshot(snap=>{
    const d = snap.data() || {};
    BUILTIN_EXTENSIONS_CACHE.map = d;
    scheduleRender();
  }, err=> console.warn('builtinExtensions sync error', err));
}
function subscribeAllCoreData(){
  subscribeMeta();
  subscribeUsers();
  subscribeAccessLog();
  subscribeResetRequests();
  subscribeCustomSections();
  subscribeBuiltinExtensions();
  BUILTIN_SECTIONS.forEach(s=> subscribeSection(s.id));
}

function getCustomSections(){ return CUSTOM_SECTIONS_CACHE.list; }
function saveCustomSection(section){ return qaCol('customSections/items').doc(section.id).set(section); }
function addFieldToBuiltinSection(sectionId, field){
  const current = BUILTIN_EXTENSIONS_CACHE.map[sectionId] || [];
  const updated = [...current, field];
  return db.collection('qa_app').doc('builtinExtensions').set({[sectionId]: updated}, {merge:true});
}
function removeFieldFromBuiltinSection(sectionId, fieldKey){
  const current = BUILTIN_EXTENSIONS_CACHE.map[sectionId] || [];
  const updated = current.filter(f=>f.key!==fieldKey);
  return db.collection('qa_app').doc('builtinExtensions').set({[sectionId]: updated}, {merge:true});
}
function deleteCustomSectionRemote(sectionId){
  qaCol('customSections/items').doc(sectionId).delete();
  qaCol('records_'+sectionId+'/items').get().then(snap=> snap.forEach(doc=> doc.ref.delete()));
}
function getAllSections(){
  const builtinsWithExtras = BUILTIN_SECTIONS.map(s=>{
    const extra = BUILTIN_EXTENSIONS_CACHE.map[s.id];
    if(!extra || !extra.length) return s;
    return {...s, fields: [...s.fields, ...extra]};
  });
  return [...builtinsWithExtras, ...getCustomSections()];
}
function getSection(id){ return getAllSections().find(s=>s.id===id); }

/* ===================== Records storage ===================== */
function getRecords(sectionId){ return RECORDS_CACHE[sectionId] || []; }
function saveRecordRemote(sectionId, record){ return qaCol('records_'+sectionId+'/items').doc(record.id).set(record); }
function deleteRecordRemote(sectionId, id){ return qaCol('records_'+sectionId+'/items').doc(id).delete(); }

/* ===================== Path get/set ===================== */
function getPath(obj, path){ return path.split('.').reduce((o,p)=> (o==null?undefined:o[p]), obj); }
function setPath(obj, path, value){
  const parts = path.split('.'); let cur = obj;
  for(let i=0;i<parts.length-1;i++){ const p = parts[i]; if(cur[p]===undefined || cur[p]===null) cur[p] = /^\d+$/.test(parts[i+1]) ? [] : {}; cur = cur[p]; }
  cur[parts[parts.length-1]] = value;
}

/* ===================== Default record builder ===================== */
function emptyValueFor(field){
  if(field.type==='group') return [];
  if(field.type==='multiDate') return [];
  if(field.type==='image') return [];
  return '';
}
function newRecord(section){
  const r = { id: uid(), _created: new Date().toISOString() };
  section.fields.forEach(f=>{ if(f.type!=='computed') r[f.key] = emptyValueFor(f); });
  return r;
}

/* ===================== Auth / User accounts ===================== */
function getUsers(){ return USERS_CACHE.list; }
function saveUserRemote(user){ return qaCol('users/items').doc(user.id).set(user); }
function deleteUserRemote(userId){ return qaCol('users/items').doc(userId).delete(); }
function isAdminSetup(){ return !!META_CACHE.adminPasswordHash; }
function getMasterCode(){ return META_CACHE.masterCode || DEFAULT_MASTER_CODE; }
function saveMetaRemote(partial){ return db.collection('qa_app').doc('meta').set(partial, {merge:true}); }
function getCurrentUser(){
  const id = Store.get('qa_currentUserId', null);
  if(id==='__admin__') return {id:'__admin__', name: t(STR.roleAdmin), role:t(STR.roleAdmin), isAdmin:true, biometricCredId: META_CACHE.adminBiometricCredId};
  if(!id) return null;
  return getUsers().find(u=>u.id===id) || null;
}
function isAdmin(){ const u = getCurrentUser(); return !!(u && u.isAdmin); }
function adminLoginCount(){ return ACCESS_LOG_CACHE.list.filter(e=> e.type==='admin-login' || e.type==='admin-setup').length; }
function pushAccessLog(entry){ qaCol('accessLog/items').doc(uid()).set(entry).catch(err=>console.warn('log error',err)); }

function initAuthState(){
  const cur = getCurrentUser();
  if(!cur){ state.auth = {screen:'welcome'}; return; }
  const unlocked = sessionStorage.getItem('qa_unlocked')==='1';
  state.auth = unlocked ? null : {screen:'lock', targetUserId: cur.id};
}

/* ===================== Rendering ===================== */
const app = document.getElementById('app');

function render(){
  document.body.className = 'lang-'+LANG;
  document.documentElement.dir = LANG==='ar' ? 'rtl':'ltr';
  document.documentElement.lang = LANG;

  if(state.auth){ app.innerHTML = renderAuthGate(); return; }

  let html = renderHeader() + '<div class="container">';
  if(state.view==='home') html += renderHome();
  else if(state.view==='dashboard') html += renderDashboard();
  else if(state.view==='list') html += renderList(state.viewSectionId);
  else if(state.view==='form') html += renderForm(state.viewSectionId);
  else if(state.view==='monthly') html += renderMonthly();
  else if(state.view==='files') html += renderFilesView();
  else if(state.view==='builder') html += renderBuilder();
  html += '</div>' + renderTabbar();
  app.innerHTML = html;
  hydrateAllImages();
}

/* ---- Dashboard / Analytics ---- */
function computeContainerAgg(records){
  let totalNC=0, totalTreated=0, totalBillQty=0, totalLoss=0, totalReback=0;
  const conditionTally={};
  records.forEach(r=>{
    totalNC += parseFloat(r.totalNC)||0;
    totalTreated += parseFloat(r.ncTreated)||0;
    totalBillQty += parseFloat(r.billQty)||0;
    totalLoss += parseFloat(r.totalLoss)||0;
    totalReback += parseFloat(r.totalReback)||0;
    (r.containerDetails||[]).forEach(cd=>{ if(cd.condition) conditionTally[cd.condition]=(conditionTally[cd.condition]||0)+1; });
  });
  return {totalNC,totalTreated,totalBillQty,totalLoss,totalReback,conditionTally,count:records.length};
}
function computeTruckAgg(records){
  const total = records.length;
  const accepted = records.filter(r=>r.inspectionResult==='accepted').length;
  const rejected = records.filter(r=>r.inspectionResult==='rejected').length;
  return {total, accepted, rejected};
}
function lastMonths(n){
  const arr=[]; const now = new Date();
  for(let i=n-1;i>=0;i--){ const d=new Date(now.getFullYear(), now.getMonth()-i, 1); arr.push({year:d.getFullYear(), month:d.getMonth()+1, key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}); }
  return arr;
}
function ncTrendData(){
  const months = lastMonths(6);
  const allContainers = getRecords('containers');
  return months.map(m=>{
    const recs = allContainers.filter(r=>r.date && r.date.startsWith(m.key));
    const nc = recs.reduce((a,r)=>a+(parseFloat(r.totalNC)||0),0);
    return {label:`${m.month}/${String(m.year).slice(2)}`, value:Math.round(nc*100)/100};
  });
}
function renderBarChart(items, color){
  const max = Math.max(1, ...items.map(i=>i.value));
  const bars = items.map(i=>{
    const h = Math.max(2, Math.round((i.value/max)*100));
    return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:0;">
      <div style="font-size:11px;font-weight:700;color:var(--navy2);margin-bottom:4px;">${i.value}</div>
      <div style="width:70%;background:${color};border-radius:6px 6px 0 0;height:${h}px;max-height:110px;transition:height .3s;"></div>
      <div style="font-size:10px;color:var(--muted);margin-top:6px;text-align:center;">${esc(i.label)}</div>
    </div>`;
  }).join('');
  return `<div style="display:flex;align-items:flex-end;height:150px;gap:6px;padding:6px 2px 0;">${bars}</div>`;
}
function renderDonut(parts){
  const total = parts.reduce((a,p)=>a+p.value,0);
  let acc=0;
  const stops = total>0 ? parts.map(p=>{
    const start = acc/total*100; acc+=p.value; const end=acc/total*100;
    return `${p.color} ${start}% ${end}%`;
  }).join(', ') : '#E3E9F1 0% 100%';
  const legend = parts.map(p=>`<div style="display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:5px;"><span style="width:10px;height:10px;border-radius:3px;background:${p.color};display:inline-block;flex-shrink:0;"></span>${esc(p.label)}: <b>${p.value}</b>${total?` (${Math.round(p.value/total*100)}%)`:''}</div>`).join('');
  return `<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
    <div style="width:96px;height:96px;border-radius:50%;background:conic-gradient(${stops});flex-shrink:0;position:relative;">
      <div style="position:absolute;inset:17px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--navy);">${total}</div>
    </div>
    <div>${legend}</div>
  </div>`;
}
function renderDashboard(){
  const period = state.dashboardPeriod;
  let containers = getRecords('containers');
  let trucks = getRecords('trucks');
  if(period==='month'){
    const {month,year} = state.monthly; const prefix=`${year}-${String(month).padStart(2,'0')}`;
    containers = containers.filter(r=>r.date && r.date.startsWith(prefix));
    trucks = trucks.filter(r=>r.date && r.date.startsWith(prefix));
  }
  const cAgg = computeContainerAgg(containers);
  const tAgg = computeTruckAgg(trucks);
  const resolvedRate = pct(cAgg.totalTreated, cAgg.totalNC);
  const lossRate = pct(cAgg.totalLoss, cAgg.totalBillQty);
  const acceptRate = pct(tAgg.accepted, tAgg.total);

  const kpis = [
    {label: LANG==='ar'?'بوالص مسجّلة':'Bills Logged', value: cAgg.count, tone:'neutral'},
    {label: LANG==='ar'?'إجمالي Total NC':'Total NC', value: cAgg.totalNC, tone: cAgg.totalNC>0?'warn':'good'},
    {label: LANG==='ar'?'نسبة المعالجة (Readressed %)':'NC Resolved Rate (Readressed %)', value: resolvedRate==null?'—':resolvedRate.toFixed(1)+'%', tone: resolvedRate==null?'neutral':(resolvedRate>=80?'good':resolvedRate>=50?'warn':'bad')},
    {label: LANG==='ar'?'نسبة الفاقد من كمية البوليصة':'Loss % of Bill Qty', value: lossRate==null?'—':lossRate.toFixed(2)+'%', tone: lossRate==null?'neutral':(lossRate<=2?'good':lossRate<=5?'warn':'bad')},
    {label: LANG==='ar'?'شاحنات مفحوصة':'Trucks Inspected', value: tAgg.total, tone:'neutral'},
    {label: LANG==='ar'?'نسبة قبول الشاحنات':'Truck Acceptance Rate', value: acceptRate==null?'—':acceptRate.toFixed(1)+'%', tone: acceptRate==null?'neutral':(acceptRate>=95?'good':acceptRate>=85?'warn':'bad')}
  ];
  const kpiHtml = kpis.map(k=>`<div class="kpi-card ${k.tone}"><div class="kpi-val">${k.value}</div><div class="kpi-lbl">${esc(k.label)}</div></div>`).join('');

  const trend = ncTrendData();
  const truckParts = [
    {label: LANG==='ar'?'مقبولة':'Accepted', value:tAgg.accepted, color:'var(--success)'},
    {label: LANG==='ar'?'مرفوضة':'Rejected', value:tAgg.rejected, color:'var(--danger)'}
  ];
  const condLabels = {good:{ar:'سليمة',en:'Good'}, damaged:{ar:'تالفة',en:'Damaged'}, repair:{ar:'تحتاج صيانة',en:'Needs Repair'}};
  const condColors = {good:'var(--success)', damaged:'var(--danger)', repair:'var(--warn)'};
  const condParts = Object.keys(cAgg.conditionTally).map(k=>({label:t(condLabels[k]||{ar:k,en:k}), value:cAgg.conditionTally[k], color:condColors[k]||'var(--accent)'}));

  const years = []; const curY = new Date().getFullYear(); for(let y=curY-2;y<=curY+1;y++) years.push(y);
  const monthOptions = Array.from({length:12},(_,i)=>i+1);

  return `
  <div class="card">
    <div class="section-title"><h2>📊 ${esc(t(STR.dashboard))}</h2></div>
    <div class="period-toggle">
      <button class="btn btn-sm ${period==='all'?'btn-primary active':'btn-outline'}" data-action="dashboard-period" data-value="all">${LANG==='ar'?'كل الفترة':'All time'}</button>
      <button class="btn btn-sm ${period==='month'?'btn-primary active':'btn-outline'}" data-action="dashboard-period" data-value="month">${LANG==='ar'?'شهر محدد':'Specific month'}</button>
      ${period==='month' ? `
        <select data-action="monthly-month">${monthOptions.map(m=>`<option value="${m}" ${m==state.monthly.month?'selected':''}>${m}</option>`).join('')}</select>
        <select data-action="monthly-year">${years.map(y=>`<option value="${y}" ${y==state.monthly.year?'selected':''}>${y}</option>`).join('')}</select>
      ` : ''}
    </div>
    <div class="kpi-grid">${kpiHtml}</div>
  </div>
  <div class="card chart-card">
    <h3>${LANG==='ar'?'اتجاه الـ NC خلال آخر ٦ أشهر':'NC Trend (last 6 months)'}</h3>
    ${renderBarChart(trend, 'var(--accent)')}
  </div>
  <div class="card chart-card">
    <h3>${LANG==='ar'?'نتائج فحص الشاحنات':'Truck Inspection Results'}</h3>
    ${renderDonut(truckParts)}
  </div>
  <div class="card chart-card">
    <h3>${LANG==='ar'?'حالة الحاويات عند الاستلام':'Container Condition on Receipt'}</h3>
    ${condParts.length ? renderDonut(condParts) : `<div class="empty-state">${esc(t(STR.noRecords))}</div>`}
  </div>`;
}

/* ---- List view ---- */
function renderList(sectionId){
  const section = getSection(sectionId);
  if(!section) return '';
  const showPerRecordPdf = section.pdfMode !== 'daily';
  const showDailyPdf = section.pdfMode !== 'perRecord';
  let records = getRecords(sectionId);
  if(state.search) records = records.filter(r=> JSON.stringify(r).toLowerCase().includes(state.search.toLowerCase()));
  if(state.dateFrom) records = records.filter(r=> r.date && r.date >= state.dateFrom);
  if(state.dateTo) records = records.filter(r=> r.date && r.date <= state.dateTo);
  records = records.slice().sort((a,b)=> (b.date||'').localeCompare(a.date||'') || (b._created||'').localeCompare(a._created||''));

  const rows = records.map(r=>{
    const mainParts = section.listFields.map(k=>{
      const f = section.fields.find(ff=>ff.key===k); if(!f) return '';
      let v = r[k];
      if(f.type==='select'){ const opt=(f.options||[]).find(o=>o.value===v); v = opt?t(opt.label):v; }
      return v ? esc(v) : '';
    }).filter(Boolean).join(' · ');
    return `<div class="record-card">
      <div class="top">
        <div>
          <div class="main">${mainParts || '—'}</div>
          <div class="meta">${r.date?esc(r.date):''}</div>
        </div>
        <div class="actions">
          ${showPerRecordPdf? `<button class="btn btn-outline btn-sm" data-action="share-record-pdf" data-section="${sectionId}" data-id="${r.id}" title="${esc(t(STR.sharePdf))}">📄</button>`:''}
          <button class="btn btn-outline btn-sm" data-action="edit-record" data-section="${sectionId}" data-id="${r.id}">✏️</button>
          <button class="btn btn-danger btn-sm" data-action="delete-record" data-section="${sectionId}" data-id="${r.id}">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="card">
    <div class="section-title">
      <h2>${section.icon} ${esc(t(section.name))}</h2>
      <button class="btn btn-primary" data-action="new-record" data-section="${sectionId}">+ ${esc(t(STR.add))}</button>
    </div>
    <div class="toolbar">
      <input type="text" placeholder="${esc(t(STR.search))}" value="${esc(state.search)}" data-action="filter-search" style="flex:1;min-width:140px;">
      <input type="date" data-action="filter-from" value="${esc(state.dateFrom)}">
      <input type="date" data-action="filter-to" value="${esc(state.dateTo)}">
      <button class="btn btn-outline btn-sm" data-action="export-csv" data-section="${sectionId}">${esc(t(STR.exportCsv))}</button>
      <button class="btn btn-outline btn-sm" data-action="export-xlsx" data-section="${sectionId}">${esc(t(STR.exportXlsx))}</button>

function renderField(f, record){
  const val = getPath(record, f.key);
  const req = f.required ? '<span class="req">*</span>' : '';
  const label = `<label>${esc(t(f.label))} ${req}</label>`;
  const full = (f.type==='textarea'||f.type==='group'||f.type==='multiDate'||f.type==='image'||f.type==='computed') ? ' field-full' : '';

  if(f.type==='text'){
    return `<div class="field${full}">${label}<input type="text" data-field="${f.key}" value="${esc(val||'')}"></div>`;
  }
  if(f.type==='number'){
    return `<div class="field${full}">${label}<input type="number" min="0" step="any" data-field="${f.key}" value="${esc(val!=null?val:'')}"></div>`;
  }
  if(f.type==='date'){
    return `<div class="field${full}">${label}<input type="date" data-field="${f.key}" value="${esc(val||'')}"></div>`;
  }
  if(f.type==='textarea'){
    return `<div class="field${full}">${label}<textarea data-field="${f.key}">${esc(val||'')}</textarea></div>`;
  }
  if(f.type==='unit'){
    return `<div class="field${full}">${label}
      <input type="text" list="unitOptionsList" data-field="${f.key}" value="${esc(val||'')}">
    </div>`;
  }
  if(f.type==='select'){
    const opts = (f.options||[]).map(o=>`<option value="${esc(o.value)}" ${o.value===val?'selected':''}>${esc(t(o.label))}</option>`).join('');
    return `<div class="field${full}">${label}<select data-field="${f.key}"><option value="">--</option>${opts}</select></div>`;
  }
  if(f.type==='computed'){
    let cv; try{ cv = f.compute(record||{}); }catch(e){ cv=null; }
    const display = (cv==null || isNaN(cv)) ? '—' : cv.toFixed(2)+'%';
    return `<div class="field field-full">${label}
      <div class="computed-box" id="computed-${f.key}">${display}</div>
      <div class="hint">${LANG==='ar'?'يُحسب تلقائياً':'Calculated automatically'}</div>
    </div>`;
  }
  if(f.type==='multiDate'){
    const arr = val || [];
    const rows = arr.map((item,idx)=>`
      <div class="md-row">
        <input type="date" data-field="${f.key}.${idx}.prod" value="${esc(item.prod||'')}" placeholder="${LANG==='ar'?'إنتاج':'Prod'}">
        <span>→</span>
        <input type="date" data-field="${f.key}.${idx}.exp" value="${esc(item.exp||'')}" placeholder="${LANG==='ar'?'انتهاء':'Exp'}">
        <button class="btn btn-danger btn-sm" data-action="remove-multidate" data-group="${f.key}" data-index="${idx}">✕</button>
      </div>`).join('');
    return `<div class="field field-full">${label}
      <div class="group-block">${rows || `<div class="hint">${LANG==='ar'?'لا توجد تواريخ مضافة':'No dates added'}</div>`}
      <button class="btn btn-outline btn-sm" data-action="add-multidate" data-group="${f.key}">+ ${LANG==='ar'?'إضافة تاريخ':'Add date'}</button></div>
    </div>`;
  }
  if(f.type==='group'){
    const arr = val || [];
    const normalSubFields = f.fields.filter(sf=>sf.type!=='image');
    const imageSubFields = f.fields.filter(sf=>sf.type==='image');
    const items = arr.map((item,idx)=>{
      const subHtml = normalSubFields.map(sf=>{
        const sval = item[sf.key];
        const subLabel = `<label>${esc(t(sf.label))}</label>`;
        if(sf.type==='select'){
          const opts = (sf.options||[]).map(o=>`<option value="${esc(o.value)}" ${o.value===sval?'selected':''}>${esc(t(o.label))}</option>`).join('');
          return `<div class="field">${subLabel}<select data-field="${f.key}.${idx}.${sf.key}"><option value="">--</option>${opts}</select></div>`;
        }
        if(sf.type==='textarea') return `<div class="field" style="grid-column:1/-1">${subLabel}<textarea data-field="${f.key}.${idx}.${sf.key}">${esc(sval||'')}</textarea></div>`;
        if(sf.type==='unit') return `<div class="field">${subLabel}<input type="text" list="unitOptionsList" data-field="${f.key}.${idx}.${sf.key}" value="${esc(sval||'')}"></div>`;
        const inputType = sf.type==='number'?'number':(sf.type==='date'?'date':'text');
        const extraAttrs = sf.type==='number' ? ' min="0" step="any"' : '';
        return `<div class="field">${subLabel}<input type="${inputType}"${extraAttrs} data-field="${f.key}.${idx}.${sf.key}" value="${esc(sval!=null?sval:'')}"></div>`;
      }).join('');
      const imageHtml = imageSubFields.map(sf=> renderImageField(`${f.key}.${idx}.${sf.key}`, item[sf.key], `<label>${esc(t(sf.label))}</label>`)).join('');
      return `<div class="group-item"><span class="chip">#${idx+1}</span>
        <div class="grid-mini" style="margin-top:8px;">${subHtml}</div>
        ${imageHtml}
        <div class="rm-row"><button class="btn btn-danger btn-sm" data-action="remove-group-item" data-group="${f.key}" data-index="${idx}">🗑️ ${esc(t(STR.delete))}</button></div>
      </div>`;
    }).join('');
    return `<div class="field field-full">
      <div class="group-block">
        <div class="group-header"><b>${esc(t(f.label))}</b>
        <button class="btn btn-primary btn-sm" data-action="add-group-item" data-group="${f.key}">+ ${esc(t(STR.add))}</button></div>
        ${items || `<div class="hint">${LANG==='ar'?'لا توجد عناصر بعد':'No items yet'}</div>`}
      </div>
    </div>`;
  }
  if(f.type==='image'){
    return renderImageField(f.key, val, label);
  }
  return '';
}

async function hydrateAllImages(){
  const imgs = document.querySelectorAll('img[data-imgid]');
  for(const img of imgs){
    const id = img.getAttribute('data-imgid');
    if(/^https?:\/\//.test(id)){ img.src = id; continue; }
    const url = await getImage(id);
    if(url) img.src = url;
  }
  if(!document.getElementById('unitOptionsList')){
    const div = document.createElement('div'); div.innerHTML = unitDatalist(); document.body.appendChild(div.firstChild);
  }
}

function renderMonthly(){
  const sections = getAllSections();
  const {month, year} = state.monthly;
  const monthStr = String(month).padStart(2,'0');
  const prefix = `${year}-${monthStr}`;
  const summaries = sections.map(s=>{
    const recs = getRecords(s.id).filter(r=> r.date && r.date.startsWith(prefix));
    const numFields = s.fields.filter(f=>f.type==='number');
    const totals = numFields.map(f=>{
      const sum = recs.reduce((acc,r)=> acc + (parseFloat(r[f.key])||0), 0);
      return {label:f.label, sum};
    });
    return {section:s, count:recs.length, totals};
  });

  const rows = summaries.map(s=>`
    <tr>
      <td>${s.section.icon} ${esc(t(s.section.name))}</td>
      <td>${s.count}</td>
      <td>${s.totals.map(tt=>`${esc(t(tt.label))}: <b>${tt.sum}</b>`).join(' · ') || '—'}</td>
      <td>

        <button class="btn btn-outline btn-sm" data-action="export-pdf-month" data-section="${s.section.id}">PDF</button>
      </td>
    </tr>`).join('');

  const years = []; const curY = new Date().getFullYear(); for(let y=curY-2;y<=curY+1;y++) years.push(y);
  const monthOptions = Array.from({length:12},(_,i)=>i+1);

  return `
  <div class="card">
    <div class="section-title"><h2>🗓️ ${esc(t(STR.monthly))}</h2></div>
    <div class="toolbar">
      <select data-action="monthly-month">${monthOptions.map(m=>`<option value="${m}" ${m==month?'selected':''}>${m}</option>`).join('')}</select>
      <select data-action="monthly-year">${years.map(y=>`<option value="${y}" ${y==year?'selected':''}>${y}</option>`).join('')}</select>

/* ===================== CSV / Export ===================== */
function flattenRecordForExport(section, r){
  const out = {};
  section.fields.forEach(f=>{
    if(f.type==='group'){
      const arr = r[f.key]||[];
      out[t(f.label)] = arr.map((item,i)=>{
        const lines = f.fields.map(sf=>{
          const val = sf.type==='image' ? `${(item[sf.key]||[]).length} ${LANG==='ar'?'صورة':'photo(s)'}` : (item[sf.key]!=null ? item[sf.key] : '');
          return `${t(sf.label)}: ${val}`;
        });
        return `#${i+1}\n` + lines.join('\n');
      }).join('\n\n');
    } else if(f.type==='multiDate'){
      const arr = r[f.key]||[];
      out[t(f.label)] = arr.map(item=> `${item.prod||''} → ${item.exp||''}`).join('\n');
    } else if(f.type==='image'){
      out[t(f.label)] = (r[f.key]||[]).length + ' ' + (LANG==='ar'?'صورة':'photo(s)');
    } else if(f.type==='select'){
      const opt = (f.options||[]).find(o=>o.value===r[f.key]);
      out[t(f.label)] = opt ? t(opt.label) : (r[f.key]||'');
    } else if(f.type==='computed'){
      let v; try{ v = f.compute(r); }catch(e){ v=null; }
      out[t(f.label)] = (v==null||isNaN(v)) ? '' : v.toFixed(2)+'%';
    } else {
      out[t(f.label)] = r[f.key]!=null ? r[f.key] : '';
    }
  });
  return out;
}
function computeColumnWidths(flatRows){
  if(!flatRows.length) return [];
  const headers = Object.keys(flatRows[0]);
  return headers.map(h=>{
    let maxLen = h.length;
    flatRows.forEach(row=>{
      const v = row[h]==null ? '' : String(row[h]);
      v.split('\n').forEach(line=>{ if(line.length>maxLen) maxLen = line.length; });
    });
    return { wch: Math.min(Math.max(maxLen+2, 14), 45) };
  });
}

function toCSV(rowsObjArr){
  if(!rowsObjArr.length) return '';
  const headers = Object.keys(rowsObjArr[0]);
  const escCsv = v=> `"${String(v==null?'':v).replace(/"/g,'""')}"`;
  const lines = [headers.map(escCsv).join(',')];
  rowsObjArr.forEach(row=> lines.push(headers.map(h=>escCsv(row[h])).join(',')));
  return '\uFEFF' + lines.join('\r\n');
}

}

function loadScriptWithFallback(urls){
  return new Promise((resolve)=>{
    let i = 0;
    function tryNext(){
      if(i >= urls.length){ resolve(false); return; }
      const s = document.createElement('script');
      s.src = urls[i];
      let settled = false;
      const timeout = setTimeout(()=>{ if(!settled){ settled=true; s.remove(); i++; tryNext(); } }, 6000);
      s.onload = ()=>{ if(!settled){ settled=true; clearTimeout(timeout); resolve(true); } };
      s.onerror = ()=>{ if(!settled){ settled=true; clearTimeout(timeout); s.remove(); i++; tryNext(); } };
      document.head.appendChild(s);
    }
    tryNext();
  });
}

function pdfFieldValue(f, record){
  const val = record[f.key];
  if(f.type==='select'){ const opt=(f.options||[]).find(o=>o.value===val); return opt? esc(t(opt.label)) : (val? esc(val):'—'); }
  if(f.type==='computed'){ let v; try{ v=f.compute(record); }catch(e){ v=null; } return (v==null||isNaN(v))?'—':(v.toFixed(2)+'%'); }
  if(f.type==='multiDate'){ const arr=val||[]; return arr.length? arr.map(i=>`${esc(i.prod||'')} → ${esc(i.exp||'')}`).join('<br>') : '—'; }
  if(f.type==='textarea') return val? esc(val).replace(/\n/g,'<br>') : '—';
  return (val==null || val==='') ? '—' : esc(val);
}

function collectImageIdsFromRecord(section, record){
  let ids = [];
  section.fields.forEach(f=>{
    if(f.type==='image'){ ids = ids.concat(record[f.key]||[]); }
    if(f.type==='group'){
      (record[f.key]||[]).forEach(item=>{
        f.fields.forEach(sf=>{ if(sf.type==='image'){ ids = ids.concat(item[sf.key]||[]); } });
      });
    }
  });
  return ids;
}
function collectImagePathsFromRecord(section, record){
  const results = [];
  section.fields.forEach(f=>{
    if(f.type==='image'){
      (record[f.key]||[]).forEach((id, idx)=> results.push({path:`${f.key}.${idx}`, id}));
    }
    if(f.type==='group'){
      (record[f.key]||[]).forEach((item, gi)=>{
        f.fields.forEach(sf=>{
          if(sf.type==='image'){
            (item[sf.key]||[]).forEach((id, idx)=> results.push({path:`${f.key}.${gi}.${sf.key}.${idx}`, id}));
          }
        });
      });
    }
  });
  return results;
}
let _retryingUploads = false;
async function retryPendingImageUploads(){
  if(_retryingUploads || !navigator.onLine) return;
  _retryingUploads = true;
  try{
    const sections = getAllSections();
    for(const section of sections){
      const records = getRecords(section.id).slice();
      for(const record of records){
        const pending = collectImagePathsFromRecord(section, record).filter(p=> !/^https?:\/\//.test(p.id));
        if(!pending.length) continue;
        let changed = false;
        for(const p of pending){
          const dataUrl = await getImage(p.id);
          if(!dataUrl) continue;
          const url = await uploadToImgBB(dataUrl);
          if(url){ setPath(record, p.path, url); changed = true; }
        }
        if(changed) await saveRecordRemote(section.id, record).catch(()=>{});
      }
    }
  } finally { _retryingUploads = false; }
}
async function buildImageMapForRecords(section, records){
  const allIds = new Set();
  records.forEach(r=> collectImageIdsFromRecord(section, r).forEach(id=>allIds.add(id)));
  const map = {};
  for(const id of allIds){
    map[id] = /^https?:\/\//.test(id) ? id : await getImage(id);
  }
  return map;
}

function renderRecordPrintHtml(section, record, imageMap){
  const plainFields = section.fields.filter(f=>f.type!=='group' && f.type!=='image');
  const rows = plainFields.map(f=> `<tr><td class="pf-label">${esc(t(f.label))}</td><td class="pf-value">${pdfFieldValue(f, record)}</td></tr>`).join('');

  const topImageFields = section.fields.filter(f=>f.type==='image');
  const topImages = topImageFields.map(f=>{
    const ids = record[f.key]||[];
    if(!ids.length) return '';
    const imgs = ids.map(id=> imageMap[id] ? `<img crossorigin="anonymous" src="${imageMap[id]}">` : '').join('');
    return `<div class="pf-imgblock"><div class="pf-imglabel">${esc(t(f.label))}</div><div class="pf-imggrid">${imgs}</div></div>`;
  }).join('');

  const groupFields = section.fields.filter(f=>f.type==='group');
  const groups = groupFields.map(f=>{
    const items = record[f.key]||[];
    if(!items.length) return '';
    const normalSub = f.fields.filter(sf=>sf.type!=='image');
    const imageSub = f.fields.filter(sf=>sf.type==='image');
    const itemsHtml = items.map((item,i)=>{
      const subRows = normalSub.map(sf=>{
        let val = item[sf.key];
        if(sf.type==='select'){ const opt=(sf.options||[]).find(o=>o.value===val); val = opt? t(opt.label): val; }
        return `<tr><td class="pf-label">${esc(t(sf.label))}</td><td class="pf-value">${val!=null && val!==''? esc(val):'—'}</td></tr>`;
      }).join('');
      const subImages = imageSub.map(sf=>{
        const ids = item[sf.key]||[];
        if(!ids.length) return '';
        const imgs = ids.map(id=> imageMap[id]? `<img crossorigin="anonymous" src="${imageMap[id]}">`:'').join('');
        return `<div class="pf-imgblock"><div class="pf-imglabel">${esc(t(sf.label))}</div><div class="pf-imggrid">${imgs}</div></div>`;
      }).join('');
      return `<div class="pf-groupitem"><div class="pf-groupnum">#${i+1}</div><table class="pf-table">${subRows}</table>${subImages}</div>`;
    }).join('');
    return `<div class="pf-group"><div class="pf-grouptitle">${esc(t(f.label))}</div>${itemsHtml}</div>`;
  }).join('');

  return `<div class="pf-record">
    <div class="pf-recordheader">${section.icon} ${esc(t(section.name))} — ${esc(record.date||'')}</div>
    <table class="pf-table">${rows}</table>
    ${topImages}
    ${groups}
  </div>`;
}

function writeAndPrintWindow(printWindow, htmlDocString){
  printWindow.document.open();
  printWindow.document.write(htmlDocString);
  printWindow.document.close();
  const triggerPrint = ()=>{ try{ printWindow.focus(); printWindow.print(); }catch(e){} };
  if(printWindow.document.readyState === 'complete'){ setTimeout(triggerPrint, 300); }
  else { printWindow.addEventListener('load', ()=> setTimeout(triggerPrint, 300)); }
}

async function shareRecordAsPDF(sectionId, recordId){

  const printWindow = window.open('', '_blank');
  if(!printWindow){ showToast(t(STR.popupBlocked)); return; }
  showToast(t(STR.generatingPdf));
  try{
    const imageMap = await buildImageMapForRecords(section, [record]);
    const title = `${t(section.name)} — ${record.date||''}`;
    const html = buildReportHtml(section, [record], title, imageMap);
    writeAndPrintWindow(printWindow, html);
  }catch(err){
    console.error('PDF generation failed', err);
    printWindow.close();
    showToast(t(STR.pdfGenericError));
  }
}

  ${user.biometricCredId? `<button class="btn btn-outline btn-block" style="margin-top:8px;" data-action="auth-unlock-biometric">${esc(t(STR.unlockBiometricBtn))}</button>`:''}
  ${!isAdminTarget? `<div style="text-align:center;margin-top:12px;"><button class="link-btn" data-action="auth-request-reset">${esc(t(STR.forgotPassword))}</button></div>`:''}
  <div style="text-align:center;margin-top:10px;"><button class="link-btn" data-action="auth-switch">${esc(t(STR.switchAccount))}</button></div>`;
}

function showAccountModal(){
  const user = getCurrentUser();
  const overlay = document.createElement('div'); overlay.className='modal-overlay';
  overlay.innerHTML = `<div class="modal-box">
    <h3>🔑 ${esc(t(STR.accessLog))}</h3>
    <div class="record-card"><div class="main">${esc(t(STR.loggedInAs))}: ${esc(user?user.name:'')}</div><div class="meta">${esc(user?(user.role||''):'')}</div></div>
    <button class="btn btn-danger btn-block" style="margin-top:10px;" data-action="auth-logout">${esc(t(STR.logout))}</button>
    <button class="btn btn-outline btn-block" style="margin-top:8px;" data-action="close-modal">${esc(t(STR.cancel))}</button>

function showResetPasswordModal(userId, reqId, name){
  const overlay = document.createElement('div'); overlay.className='modal-overlay';
  overlay.innerHTML = `<div class="modal-box">
    <h3>🔓 ${esc(t(STR.setNewPasswordTitle))} ${esc(name)}</h3>
    <div class="field"><input type="text" id="newPassForUser" placeholder="${esc(t(STR.setNewPasswordPlaceholder))}"></div>
    <button class="btn btn-primary btn-block" style="margin-top:10px;" data-action="confirm-reset-password" data-userid="${userId}" data-reqid="${reqId}">${esc(t(STR.resetPasswordAction))}</button>
    <button class="btn btn-outline btn-block" style="margin-top:8px;" data-action="close-modal">${esc(t(STR.cancel))}</button>
  </div>`;
